name: tripmate
description: "TripMate — AI-powered collaborative travel expense management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State management (Architecture §4, CLAUDE.md §4)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation (Architecture §5)
  go_router: ^14.6.2

  # Backend (Architecture §7)
  supabase_flutter: ^2.8.1

  # Offline storage (Architecture §6)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Secure session storage (Architecture §8, CLAUDE.md §13)
  flutter_secure_storage: ^9.2.2

  # Connectivity for offline-first sync triggers (Architecture §6)
  connectivity_plus: ^6.1.0

  # UUIDs for client-generated primary keys (DB Design §8)
  uuid: ^4.5.1

  # Receipts: capture + downscale before upload (Architecture §10)
  image_picker: ^1.1.2

  # Reports: charts + offline PDF export/share (Architecture §59-60, §14)
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.3

  # Models / serialization (CLAUDE.md §9)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Logging (Architecture §14)
  logger: ^2.5.0

  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.22.0

  # QR code generation + scanning (username-based friend/trip add)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints (CLAUDE.md §9) — zero-warning gate
  very_good_analysis: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
